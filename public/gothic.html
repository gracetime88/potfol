<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethno Gothic Eyewear - Anna K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: white; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <a href="/" class="inline-flex items-center text-zinc-400 hover:text-white transition-colors mb-12 group">
            <span class="mr-2 transition-transform group-hover:-translate-x-1">←</span> Вернуться на главную
        </a>
        
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-4">Ethno Gothic Eyewear</h1>
            <p class="text-zinc-500 text-xl">Product / glasse etno gothic</p>
        </header>

        <div class="grid gap-12">
            <video src="/glasses_etno_gothic_01.mp4" controls class="w-full rounded-2xl shadow-2xl" onerror="if(!this.src.includes('.mov')) { this.src=this.src.replace('.mp4', '.mov'); } else { this.style.display='none'; }"></video>
            <video src="/glasses_etno_gothic_02.mp4" controls class="w-full rounded-2xl shadow-2xl" onerror="if(!this.src.includes('.mov')) { this.src=this.src.replace('.mp4', '.mov'); } else { this.style.display='none'; }"></video>
            <video src="/glasses_etno_gothic_03.mov" controls class="w-full rounded-2xl shadow-2xl" onerror="if(!this.src.includes('.mp4')) { this.src=this.src.replace('.mov', '.mp4'); } else { this.style.display='none'; }"></video>
            <video src="/glasses_etno_gothic_04.mov" controls class="w-full rounded-2xl shadow-2xl" onerror="if(!this.src.includes('.mp4')) { this.src=this.src.replace('.mov', '.mp4'); } else { this.style.display='none'; }"></video>
        </div>
    </div>
</body>
</html>
