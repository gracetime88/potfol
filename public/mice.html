<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mice Illustrations - Anna K.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
        .font-display { font-family: 'Playfair+Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-16">
            <a href="/" class="text-2xl font-bold tracking-tighter">ANNA K<span class="text-zinc-500">.</span></a>
            <a href="/" class="glass px-6 py-2 rounded-full text-sm uppercase tracking-widest hover:bg-white/10 transition-all">Back to Projects</a>
        </nav>

        <header class="mb-20">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-4">Mice Illustrations</h1>
            <p class="text-zinc-500 text-xl">Illustration / Character Design</p>
        </header>

        <div class="grid gap-12">
            <img src="/mice-book.webp" alt="Mice Book Cover" class="w-full rounded-2xl shadow-2xl" onerror="this.onerror=null; this.src='/mice-book.jpg'; this.onerror=()=> { this.src='/mice-book.png'; this.onerror=()=> { this.style.display='none'; } }">
            <img src="/mice-book_01.webp" alt="Mice Illustration 1" class="w-full rounded-2xl shadow-2xl" onerror="this.onerror=null; this.src='/mice-book_01.jpg'; this.onerror=()=> { this.src='/mice-book_01.png'; this.onerror=()=> { this.style.display='none'; } }">
            <img src="/mice-book_02.webp" alt="Mice Illustration 2" class="w-full rounded-2xl shadow-2xl" onerror="this.onerror=null; this.src='/mice-book_02.jpg'; this.onerror=()=> { this.src='/mice-book_02.png'; this.onerror=()=> { this.style.display='none'; } }">
            <img src="/mice-book_03.webp" alt="Mice Illustration 3" class="w-full rounded-2xl shadow-2xl" onerror="this.onerror=null; this.src='/mice-book_03.jpg'; this.onerror=()=> { this.src='/mice-book_03.png'; this.onerror=()=> { this.style.display='none'; } }">
            <img src="/mice-book_04.webp" alt="Mice Illustration 4" class="w-full rounded-2xl shadow-2xl" onerror="this.onerror=null; this.src='/mice-book_04.jpg'; this.onerror=()=> { this.src='/mice-book_04.png'; this.onerror=()=> { this.style.display='none'; } }">
            <img src="/mice-book_05.webp" alt="Mice Illustration 5" class="w-full rounded-2xl shadow-2xl" onerror="this.onerror=null; this.src='/mice-book_05.jpg'; this.onerror=()=> { this.src='/mice-book_05.png'; this.onerror=()=> { this.style.display='none'; } }">
        </div>
    </div>
</body>
</html>
