<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quagga Fashion - Anna K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: white; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <a href="/" class="inline-flex items-center text-zinc-400 hover:text-white transition-colors mb-12 group">
            <span class="mr-2 transition-transform group-hover:-translate-x-1">←</span> Вернуться на главную
        </a>
        
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-4">Quagga Fashion</h1>
            <p class="text-zinc-500 text-xl">Brand Identity / brand_Qwagga</p>
        </header>

        <div class="grid gap-12">
            <img src="/brand_Qwagga_01.png" alt="Quagga 1" class="w-full rounded-2xl shadow-2xl" onerror="this.style.display='none'">
            <img src="/brand_Qwagga_02.jpg" alt="Quagga 2" class="w-full rounded-2xl shadow-2xl" onerror="this.style.display='none'">
            <img src="/brand_Qwagga_03.jpg" alt="Quagga 3" class="w-full rounded-2xl shadow-2xl" onerror="this.style.display='none'">
            <img src="/brand_Qwagga_04.jpg" alt="Quagga 4" class="w-full rounded-2xl shadow-2xl" onerror="this.style.display='none'">
            <img src="/brand_Qwagga_05.png" alt="Quagga 5" class="w-full rounded-2xl shadow-2xl" onerror="this.style.display='none'">
        </div>
    </div>
</body>
</html>
