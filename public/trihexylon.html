<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigexilon Visuals - Anna K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: white; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <a href="/" class="inline-flex items-center text-zinc-400 hover:text-white transition-colors mb-12 group">
            <span class="mr-2 transition-transform group-hover:-translate-x-1">←</span> Вернуться на главную
        </a>
        
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-4">Trigexilon Visuals</h1>
            <p class="text-zinc-500 text-xl">Graphic Design / trigexilon</p>
        </header>

        <div class="grid gap-12">
            <video src="/trigexilon_01.mp4" controls class="w-full rounded-2xl shadow-2xl" onerror="if(!this.src.includes('trihexylon')) { this.src=this.src.replace('trigexilon', 'trihexylon'); } else { this.style.display='none'; }"></video>
            <img src="/trigexilon_02.webp" alt="Trigexilon 2" class="w-full rounded-2xl shadow-2xl" onerror="this.src=this.src.replace('.webp', '.jpg'); this.onerror=()=>this.src=this.src.replace('.jpg', '.png');">
            <img src="/trigexilon_03.webp" alt="Trigexilon 3" class="w-full rounded-2xl shadow-2xl" onerror="this.src=this.src.replace('.webp', '.jpg'); this.onerror=()=>this.src=this.src.replace('.jpg', '.png');">
            <img src="/trigexilon_04.webp" alt="Trigexilon 4" class="w-full rounded-2xl shadow-2xl" onerror="this.src=this.src.replace('.webp', '.jpg'); this.onerror=()=>this.src=this.src.replace('.jpg', '.png');">
        </div>
    </div>
</body>
</html>
